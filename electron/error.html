<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Error</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8d7da;
            color: #721c24;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { margin-top: 0; }
        p { font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Application failed to load.</h1>
        <p>Please restart the application.</p>
        <p style="font-size: 0.9rem; color: #666;">Check the logs in your AppData directory for more details.</p>
    </div>
</body>
</html>
